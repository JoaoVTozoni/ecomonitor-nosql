version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: ecomonitor_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecomonitor
      MONGO_INITDB_ROOT_PASSWORD: ecomonitor123
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis/redis-stack:latest
    container_name: ecomonitor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass ecomonitor123"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    container_name: ecomonitor_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/ecomonitor123
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins

volumes:
  mongo_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
